<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Assistant — AI PDF Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 780px;
      height: 92vh;
      display: flex;
      flex-direction: column;
      background: #16162a;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    /* ── Header ── */
    .header {
      padding: 20px 24px;
      background: #1e1e3a;
      border-bottom: 1px solid #2e2e50;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .header h1 { font-size: 18px; color: #fff; }
    .header p  { font-size: 12px; color: #888; margin-top: 2px; }

    .status-dot {
      margin-left: auto;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    .status-dot.active { background: #3ecfcf; box-shadow: 0 0 8px #3ecfcf; }

    /* ── Upload Bar ── */
    .upload-bar {
      padding: 14px 24px;
      background: #1a1a30;
      border-bottom: 1px solid #2e2e50;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .upload-bar label {
      cursor: pointer;
      background: #6c63ff;
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .upload-bar label:hover { background: #5548e0; }

    #file-input { display: none; }

    #upload-status {
      font-size: 13px;
      color: #888;
      flex: 1;
    }
    #upload-status.success { color: #3ecfcf; }
    #upload-status.error   { color: #ff6b6b; }

    .upload-loader {
      width: 16px; height: 16px;
      border: 2px solid #333;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    /* ── Chat Area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeIn 0.3s ease;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.ai   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #6c63ff, #5548e0);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: #1e1e3a;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
      border: 1px solid #2e2e50;
    }

    .label {
      font-size: 11px;
      color: #555;
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #6c63ff;
      animation: bounce 1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #444;
    }
    .empty-state .icon { font-size: 48px; }
    .empty-state p { font-size: 14px; }

    /* ── Input Bar ── */
    .input-bar {
      padding: 16px 24px;
      background: #1a1a30;
      border-top: 1px solid #2e2e50;
      display: flex;
      gap: 10px;
    }

    #question-input {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2e2e50;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    #question-input:focus { border-color: #6c63ff; }
    #question-input::placeholder { color: #444; }

    #send-btn {
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 18px;
      transition: opacity 0.2s, transform 0.1s;
    }
    #send-btn:hover { opacity: 0.9; transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes bounce  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">📚</div>
    <div>
      <h1>Study Assistant</h1>
      <p>Upload a PDF and ask anything about it</p>
    </div>
    <div class="status-dot" id="status-dot"></div>
  </div>

  <!-- Upload Bar -->
  <div class="upload-bar">
    <label for="file-input">📎 Upload PDF</label>
    <input type="file" id="file-input" accept=".pdf" />
    <span id="upload-status">No document loaded</span>
    <div class="upload-loader" id="upload-loader"></div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="icon">🎓</div>
      <p>Upload a PDF to get started</p>
      <p>Then ask any question about its content</p>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <input
      type="text"
      id="question-input"
      placeholder="Ask a question about your document..."
      disabled
    />
    <button id="send-btn" disabled>➤</button>
  </div>

</div>

<script>
  const fileInput     = document.getElementById("file-input");
  const uploadStatus  = document.getElementById("upload-status");
  const uploadLoader  = document.getElementById("upload-loader");
  const chatArea      = document.getElementById("chat-area");
  const emptyState    = document.getElementById("empty-state");
  const questionInput = document.getElementById("question-input");
  const sendBtn       = document.getElementById("send-btn");
  const statusDot     = document.getElementById("status-dot");

  // ── Upload PDF ──
  fileInput.addEventListener("change", async () => {
    const file = fileInput.files[0];
    if (!file) return;

    uploadStatus.textContent = "Processing PDF...";
    uploadStatus.className = "";
    uploadLoader.style.display = "block";
    statusDot.className = "status-dot";

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res  = await fetch("/upload", { method: "POST", body: formData });
      const data = await res.json();

      if (res.ok) {
        uploadStatus.textContent = `✓ ${data.message}`;
        uploadStatus.className   = "success";
        statusDot.className      = "status-dot active";
        questionInput.disabled   = false;
        sendBtn.disabled         = false;
        questionInput.placeholder = `Ask anything about "${file.name}"...`;
        if (emptyState) emptyState.remove();
        addMessage("ai", `Document loaded! I've processed **${file.name}**. Ask me anything about it.`);
      } else {
        uploadStatus.textContent = `✗ ${data.error}`;
        uploadStatus.className   = "error";
      }
    } catch {
      uploadStatus.textContent = "✗ Upload failed. Is the server running?";
      uploadStatus.className   = "error";
    } finally {
      uploadLoader.style.display = "none";
    }
  });

  // ── Send Question ──
  async function sendQuestion() {
    const question = questionInput.value.trim();
    if (!question) return;

    addMessage("user", question);
    questionInput.value = "";
    questionInput.disabled = true;
    sendBtn.disabled = true;

    const typingId = addTypingIndicator();

    try {
      const res  = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      removeTypingIndicator(typingId);
      addMessage("ai", data.answer || data.error);
    } catch {
      removeTypingIndicator(typingId);
      addMessage("ai", "Something went wrong. Please try again.");
    } finally {
      questionInput.disabled = false;
      sendBtn.disabled = false;
      questionInput.focus();
    }
  }

  sendBtn.addEventListener("click", sendQuestion);
  questionInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) sendQuestion();
  });

  // ── Helpers ──
  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="label">${role === "user" ? "You" : "AI Assistant"}</div>
      <div class="bubble">${text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")}</div>
    `;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function addTypingIndicator() {
    const id  = "typing-" + Date.now();
    const div = document.createElement("div");
    div.className = "message ai typing";
    div.id = id;
    div.innerHTML = `
      <div class="label">AI Assistant</div>
      <div class="bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    `;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return id;
  }

  function removeTypingIndicator(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }
</script>
</body>
</html>
